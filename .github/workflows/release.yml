name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} dmg
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build desktop dmg
        run: npm run desktop:dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: frigg-${{ matrix.arch }}-dmg
          path: packages/desktop/release/*.dmg
          if-no-files-found: error

      - name: Attach dmg to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/release/*.dmg
          fail_on_unmatched_files: true
