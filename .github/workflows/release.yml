name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} dmg
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web + server
        run: npm run build

      - name: Bundle desktop main
        run: npm run build:main --workspace @frigg/desktop

      - name: Package ${{ matrix.arch }} dmg
        working-directory: packages/desktop
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: frigg-${{ matrix.arch }}-dmg
          path: packages/desktop/release/*.dmg
          if-no-files-found: error

      - name: Attach dmg to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/release/*.dmg
          fail_on_unmatched_files: true
